<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>View on Listd</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, sans-serif;
      background: #F6F8F9;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .card {
      text-align: center;
      padding: 40px 32px;
      max-width: 360px;
    }
    .logo {
      font-size: 36px;
      font-weight: 800;
      color: #1E6B8C;
      margin-bottom: 24px;
    }
    .logo span { font-weight: 300; color: #6B9E6B; }
    .icon {
      width: 80px;
      height: 80px;
      background: #1E6B8C;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .icon svg { width: 40px; height: 40px; fill: white; }
    h2 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    p {
      color: #666;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 28px;
    }
    .btn {
      background: #1E6B8C;
      color: white;
      padding: 16px 36px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      display: inline-block;
    }
    .hint {
      margin-top: 16px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">List<span>d</span></div>
    <h2>View this property</h2>
    <p>Tap the button below or the <strong>Open</strong> banner at the top of your screen to view this listing in the Listd app.</p>
    <a id="openBtn" class="btn" href="#">Open in Listd</a>
    <p class="hint">Don't have Listd? Download it on the App Store.</p>
  </div>
  <script>
    const path = window.location.pathname;
    const parts = path.split('/listing/');
    const id = parts.length > 1 ? parts[1].replace(/\/$/, '') : '';
    if (id) {
      document.getElementById('openBtn').href = 'ca.prairienomad.listd://listing/' + id;
    }
  </script>
</body>
</html>
