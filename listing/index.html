<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Listd</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #F6F8F9;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card { text-align: center; padding: 40px; }
    h1 { color: #1E6B8C; font-size: 24px; }
    p { color: #666; margin: 12px 0 24px; }
    a {
      background: #1E6B8C;
      color: white;
      padding: 14px 28px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
  <script>
    // Extract listing ID from URL path
    const path = window.location.pathname;
    const id = path.split('/listing/')[1];
    if (id) {
      window.location.href = 'ca.prairienomad.listd://listing/' + id;
    }
  </script>
</head>
<body>
  <div class="card">
    <h1>Opening in Listd...</h1>
    <p>View this property listing in the Listd app.</p>
    <a id="openBtn" href="#">Open in Listd</a>
  </div>
  <script>
    const path = window.location.pathname;
    const id = path.split('/listing/')[1];
    if (id) {
      document.getElementById('openBtn').href = 'ca.prairienomad.listd://listing/' + id;
    }
  </script>
</body>
</html>
