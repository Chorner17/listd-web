<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Listd — View Property</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #F6F8F9;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card { text-align: center; padding: 40px; }
    .logo { font-size: 32px; font-weight: 800; color: #1E6B8C; }
    .logo span { font-weight: 300; color: #6B9E6B; }
    h2 { color: #333; font-size: 18px; margin: 16px 0 8px; }
    p { color: #666; margin: 0 0 28px; font-size: 14px; }
    a {
      background: #1E6B8C;
      color: white;
      padding: 16px 36px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">List<span>d</span></div>
    <h2>View this property in Listd</h2>
    <p>Tap below to open this listing in the app.</p>
    <a id="openBtn" href="#">Open in Listd</a>
  </div>
  <script>
    const path = window.location.pathname;
    const parts = path.split('/listing/');
    const id = parts.length > 1 ? parts[1] : '';
    if (id) {
      document.getElementById('openBtn').href = 'ca.prairienomad.listd://listing/' + id;
    }
  </script>
</body>
</html>
